# Skill: publish_telegram
# Used by: Action layer — actual publication to t.me/sergeisolovev
# Triggers: Critic PASS verdict + Tier check

name: publish_telegram
version: 1.0.0
description: |
  Publish an approved draft to Sergei's Telegram channel via Bot API.
  Records publication URL, ID, timestamp. Idempotent — skips if same
  draft_path already published.

audience: agent-internal
category: action
estimated_duration_seconds: 8
estimated_cost_usd: 0.00

inputs:
  - name: draft_path
    type: filepath
    required: true
  - name: channel
    type: string
    default: "@sergeisolovev"
  - name: disable_web_page_preview
    type: boolean
    default: false
  - name: pin_message
    type: boolean
    default: false
    description: "Pin to channel top (only for milestone announcements)"

outputs:
  - name: message_id
    type: integer
  - name: message_url
    type: string

tools_required:
  - http
  - filesystem
  - sqlite
  - secret:TELEGRAM_BOT_TOKEN

procedure:
  - step: "Idempotency check"
    action: sqlite_query
    query: |
      SELECT message_id FROM published
      WHERE draft_path = :draft_path AND channel = :channel
    capture: existing

  - step: "Skip if already published"
    action: return
    when: "existing is not None"
    value: { skipped: true, reason: "already_published", existing: "{{ existing }}" }

  - step: "Read draft and strip frontmatter"
    action: python_inline
    code: |
      raw = read_file(inputs.draft_path)
      # remove YAML frontmatter
      if raw.startswith("---"):
          _, fm, body = raw.split("---", 2)
          frontmatter = yaml.safe_load(fm)
      else:
          body = raw
          frontmatter = {}
      body = body.strip()
      # ensure ≤ 4096 chars (Telegram limit)
      if len(body) > 4096:
          raise ValueError(f"Body too long: {len(body)} chars > 4096")
      state.set("draft_body", body)
      state.set("draft_meta", frontmatter)

  - step: "Verify Critic verdict in event log"
    action: sqlite_query
    query: |
      SELECT verdict, ts FROM critic_verdicts
      WHERE draft_path = :draft_path
      ORDER BY ts DESC LIMIT 1
    capture: critic_verdict
  - step: "Refuse if no PASS"
    action: return
    when: "critic_verdict is None or critic_verdict.verdict != 'PASS'"
    value: { skipped: true, reason: "no_critic_pass", verdict: "{{ critic_verdict }}" }

  - step: "Check tier authorization"
    action: python_inline
    code: |
      tier = draft_meta.get("tier", 2)
      if tier == 3 and not state.has_approval(inputs.draft_path):
          raise PermissionError("Tier 3 requires human /approve")
      if tier == 4:
          raise PermissionError("Tier 4 requires RentAHuman; cannot auto-publish")

  - step: "Post to Telegram"
    action: http_post
    url: "https://api.telegram.org/bot{{ secret.TELEGRAM_BOT_TOKEN }}/sendMessage"
    json:
      chat_id: "{{ inputs.channel }}"
      text: "{{ draft_body }}"
      parse_mode: Markdown
      disable_web_page_preview: "{{ inputs.disable_web_page_preview }}"
    capture: tg_response
    retries: 3
    backoff_seconds: 5

  - step: "Pin if requested"
    action: http_post
    when: inputs.pin_message
    url: "https://api.telegram.org/bot{{ secret.TELEGRAM_BOT_TOKEN }}/pinChatMessage"
    json:
      chat_id: "{{ inputs.channel }}"
      message_id: "{{ tg_response.result.message_id }}"

  - step: "Record publication"
    action: sqlite_exec
    query: |
      INSERT INTO published
      (draft_path, channel, message_id, message_url, published_at)
      VALUES (:draft_path, :channel, :message_id, :message_url, :now)
    bind:
      message_id: "{{ tg_response.result.message_id }}"
      message_url: "https://t.me/{{ inputs.channel | strip('@') }}/{{ tg_response.result.message_id }}"

  - step: "Audit-log to git (every publication committed)"
    action: shell
    command: |
      cd /workspace/sergei-brand-agent
      git add data/published.jsonl
      git -c user.name="brand-agent" -c user.email="agent@sergeisolovev.com" \
        commit -m "Publish: {{ draft_meta.topic }} → telegram"
      git push origin main

  - step: "Return"
    action: return
    value:
      published: true
      message_id: "{{ tg_response.result.message_id }}"
      message_url: "https://t.me/{{ inputs.channel | strip('@') }}/{{ tg_response.result.message_id }}"

error_handling:
  - on: rate_limit
    action: sleep_and_retry
    sleep_seconds: 60
  - on: http_400
    action: log_error_escalate
    notify: telegram
    message: "Bad request to Telegram API — likely malformed Markdown"
  - on: http_403
    action: log_error_escalate
    message: "Bot kicked from channel or invalid token"
  - on: shell_error
    action: log_warn_continue
    note: "git commit failure non-blocking; publication already done"

guards:
  - skip_if: state.emergency_pause == true
  - skip_if: state.publishes_today >= env.MAX_PUBLISHES_PER_DAY

tier: 1   # Telegram personal channel = full auto after Critic PASS
